name: Deploy Quantis Unified

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-worker:
    name: Deploy Simulation Engine (Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: npm install -g wrangler
          
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-pages:
    name: Deploy Frontend (Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Build Next-on-Pages
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          export NPM_CONFIG_LEGACY_PEER_DEPS=true
          npm run pages:build
        env:
          NEXT_PUBLIC_WORKER_URL: https://quantis-sim-engine.successstairway52.workers.dev
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NPM_CONFIG_LEGACY_PEER_DEPS: true
        
      - name: Verify Build Output
        run: |
          if [ -d ".vercel/output" ]; then
            echo "Build successful, output directory exists."
          else
            echo "Error: .vercel/output directory not found!"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .vercel/output --project-name=quantis-platform
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
