<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Quantis magic link</title>
  </head>
  <body style="margin:0;background:#D6EAFF;color:#111111;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#D6EAFF;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#FFFFFF;border:4px solid #111111;box-shadow:10px 10px 0 #111111;">
            <tr>
              <td style="padding:28px 28px 10px;">
                <div style="display:inline-block;background:#FF90E8;border:3px solid #111111;padding:6px 10px;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;">Passwordless Access</div>
                <h1 style="margin:22px 0 8px;font-size:44px;line-height:0.92;font-weight:900;letter-spacing:-2px;text-transform:uppercase;">Launch Session.</h1>
                <p style="margin:0;color:#4b5563;font-size:16px;line-height:1.6;font-weight:700;">Tap the button to sign in to Quantis. This link is one-time use and returns you to the Quantis app after verification.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px 28px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#FF90E8;color:#111111;border:4px solid #111111;box-shadow:6px 6px 0 #111111;padding:16px 22px;text-decoration:none;font-size:15px;font-weight:900;letter-spacing:2px;text-transform:uppercase;">Sign In to Quantis</a>
                <p style="margin:28px 0 0;font-family:Courier New,monospace;font-size:12px;line-height:1.6;color:#111111;font-weight:700;">If the button fails, paste this secure link into your browser:<br><span style="word-break:break-all;color:#6b7280;">{{ .ConfirmationURL }}</span></p>
              </td>
            </tr>
            <tr>
              <td style="background:#111111;color:#FFFFFF;padding:14px 28px;font-family:Courier New,monospace;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;">Quantis Auth Core / Magic Link</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
